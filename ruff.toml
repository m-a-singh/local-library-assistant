# Ruff configuration for Local Library Assistant

line-length = 120

target-version = "py39"

[lint]
# Keep this modest for a portfolio repo; tighten over time.
select = [
  "E",
  "F",
  "I",
]
ignore = [
  "E501", # line length (handled by formatter; keep README/code readable)
]

[format]
quote-style = "double"
indent-style = "space"
